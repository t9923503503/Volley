<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Карточка Лютого Пляжника</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ── RESET & VARIABLES ──────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --card:#111118;
  --card2:#16161f;
  --glass:rgba(255,255,255,.04);
  --glass-border:rgba(255,255,255,.08);
  --text:#f0f0f5;
  --muted:#6a6a80;
  --accent:#ff6a1a;
  --accent2:#ff9500;
  --accent-glow:rgba(255,106,26,.35);
  --neon:#ff6a1a;
  --gold:#FFD700;
  --silver:#C0C0C0;
  --bronze:#CD7F32;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#3b82f6;
  --purple:#a855f7;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  overflow-x:hidden;
}

/* ── CARD CONTAINER ─────────────────────────────────── */
.fighter-card{
  width:100%;max-width:420px;
  background:var(--card);
  border-radius:24px;
  border:2px solid rgba(255,106,26,.25);
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 60px rgba(255,106,26,.08),
    0 25px 80px rgba(0,0,0,.6);
}
/* Ambient gradient glow */
.fighter-card::before{
  content:'';position:absolute;top:-50%;left:-50%;
  width:200%;height:200%;
  background:conic-gradient(from 180deg at 50% 50%,
    transparent 0deg,
    rgba(255,106,26,.06) 60deg,
    transparent 120deg,
    rgba(255,149,0,.04) 200deg,
    transparent 300deg);
  animation:cardRotate 12s linear infinite;
  pointer-events:none;z-index:0;
}
@keyframes cardRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Glass overlay on top of rotating gradient */
.fighter-card::after{
  content:'';position:absolute;inset:0;
  background:var(--card);
  border-radius:22px;
  z-index:1;
}
.fighter-card>*{position:relative;z-index:2}

/* ── HEADER ─────────────────────────────────────────── */
.fc-header{
  padding:28px 24px 20px;
  display:flex;align-items:center;gap:18px;
  background:linear-gradient(135deg,rgba(255,106,26,.08) 0%,transparent 60%);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.fc-avatar{
  width:88px;height:88px;
  border-radius:50%;
  border:3px solid var(--accent);
  box-shadow:0 0 24px var(--accent-glow),inset 0 0 20px rgba(0,0,0,.4);
  overflow:hidden;
  flex-shrink:0;
  position:relative;
  background:linear-gradient(135deg,#1a1a2e,#0d0d1a);
  display:flex;align-items:center;justify-content:center;
}
.fc-avatar img{width:100%;height:100%;object-fit:cover}
.fc-avatar-initials{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;letter-spacing:2px;
  color:var(--accent);
  text-shadow:0 0 20px var(--accent-glow);
}
.fc-info{flex:1;min-width:0}
.fc-nickname{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;letter-spacing:3px;line-height:1;
  color:var(--text);
  text-shadow:0 2px 10px rgba(0,0,0,.5);
  margin-bottom:4px;
}
.fc-rank{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:6px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:900;letter-spacing:1.5px;
  text-transform:uppercase;
  box-shadow:0 0 16px var(--accent-glow);
}
.fc-rank i{font-size:10px}
.fc-community{
  margin-top:8px;
  font-size:11px;color:var(--muted);
  letter-spacing:.5px;
  display:flex;align-items:center;gap:5px;
}
.fc-community i{color:var(--accent);font-size:10px}

/* ── MAIN STATS ─────────────────────────────────────── */
.fc-stats{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:2px;
  padding:2px;
  margin:20px 20px 0;
  background:rgba(255,255,255,.03);
  border-radius:16px;
  border:1px solid var(--glass-border);
  overflow:hidden;
}
.fc-stat{
  padding:18px 12px;
  text-align:center;
  background:var(--glass);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  position:relative;
}
.fc-stat:first-child{border-radius:14px 0 0 14px}
.fc-stat:last-child{border-radius:0 14px 14px 0}
.fc-stat-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;line-height:1;
  letter-spacing:1px;
  background:linear-gradient(180deg,var(--text) 30%,var(--muted));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.fc-stat-val.accent{
  background:linear-gradient(180deg,var(--accent) 30%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.fc-stat-lbl{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-top:4px;
}

/* ── ACHIEVEMENTS ───────────────────────────────────── */
.fc-section{padding:20px 24px 0}
.fc-section-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.fc-section-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(255,255,255,.1),transparent);
}
.fc-badges{display:flex;gap:10px;flex-wrap:wrap}
.fc-badge{
  width:52px;height:52px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  background:var(--glass);
  border:1.5px solid var(--glass-border);
  position:relative;
  cursor:default;
  transition:all .25s ease;
}
.fc-badge::after{
  content:attr(data-count);
  position:absolute;top:-4px;right:-4px;
  min-width:18px;height:18px;
  border-radius:9px;
  background:var(--card);
  border:1.5px solid var(--glass-border);
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:900;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
}
.fc-badge[data-count="0"]::after{display:none}
.fc-badge.gold{
  border-color:rgba(255,215,0,.3);
  background:linear-gradient(135deg,rgba(255,215,0,.1),transparent);
}
.fc-badge.gold:hover{
  border-color:rgba(255,215,0,.6);
  box-shadow:0 0 20px rgba(255,215,0,.25);
  transform:translateY(-2px);
}
.fc-badge.silver{
  border-color:rgba(192,192,192,.25);
  background:linear-gradient(135deg,rgba(192,192,192,.08),transparent);
}
.fc-badge.silver:hover{
  border-color:rgba(192,192,192,.5);
  box-shadow:0 0 20px rgba(192,192,192,.2);
  transform:translateY(-2px);
}
.fc-badge.bronze{
  border-color:rgba(205,127,50,.25);
  background:linear-gradient(135deg,rgba(205,127,50,.08),transparent);
}
.fc-badge.bronze:hover{
  border-color:rgba(205,127,50,.5);
  box-shadow:0 0 20px rgba(205,127,50,.2);
  transform:translateY(-2px);
}
.fc-badge.special{
  border-color:rgba(168,85,247,.3);
  background:linear-gradient(135deg,rgba(168,85,247,.1),transparent);
}
.fc-badge.special:hover{
  border-color:rgba(168,85,247,.6);
  box-shadow:0 0 20px rgba(168,85,247,.25);
  transform:translateY(-2px);
}
.fc-badge-tooltip{
  display:none;position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%);
  padding:5px 10px;border-radius:8px;
  background:rgba(0,0,0,.9);border:1px solid rgba(255,255,255,.1);
  font-size:10px;font-weight:700;white-space:nowrap;
  color:var(--text);z-index:10;
  pointer-events:none;
}
.fc-badge:hover .fc-badge-tooltip{display:block}

/* ── PERSONAL INFO ──────────────────────────────────── */
.fc-personal{
  display:flex;align-items:center;gap:16px;
  padding:16px 20px;
  margin:20px 20px 0;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:14px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.fc-jersey{
  display:flex;align-items:center;gap:8px;
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:2px;
  color:var(--accent);
}
.fc-jersey i{font-size:18px;opacity:.7}
.fc-personal-sep{
  width:1px;height:32px;
  background:rgba(255,255,255,.1);
}
.fc-socials{display:flex;gap:10px;align-items:center}
.fc-social{
  width:36px;height:36px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  color:var(--muted);
  font-size:16px;
  text-decoration:none;
  transition:all .2s;
}
.fc-social:hover{
  color:var(--text);
  border-color:rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  transform:translateY(-1px);
}

/* ── HISTORY TABLE ──────────────────────────────────── */
.fc-history{
  margin:20px 20px 0;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:14px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.fc-history table{width:100%;border-collapse:collapse}
.fc-history th{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);
  padding:12px 14px;
  text-align:left;
  background:rgba(255,255,255,.02);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.fc-history td{
  padding:10px 14px;
  font-size:13px;font-weight:500;
  border-bottom:1px solid rgba(255,255,255,.03);
  color:var(--text);
}
.fc-history tr:last-child td{border-bottom:none}
.fc-history tr{transition:background .15s}
.fc-history tbody tr:hover{background:rgba(255,255,255,.03)}
.fc-place{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:8px;
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;font-weight:700;
}
.fc-place.p1{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.fc-place.p2{background:rgba(192,192,192,.12);color:var(--silver);border:1px solid rgba(192,192,192,.25)}
.fc-place.p3{background:rgba(205,127,50,.12);color:var(--bronze);border:1px solid rgba(205,127,50,.25)}
.fc-place.other{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.fc-trn-name{
  font-weight:600;
  max-width:160px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fc-trn-date{font-size:12px;color:var(--muted)}

/* ── SHARE BUTTON ───────────────────────────────────── */
.fc-footer{
  padding:20px 24px 24px;
}
.fc-share-btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:2px solid var(--accent);
  background:linear-gradient(135deg,rgba(255,106,26,.12),rgba(255,149,0,.05));
  color:var(--accent);
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:3px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .25s;
  touch-action:manipulation;
}
.fc-share-btn:hover{
  background:linear-gradient(135deg,rgba(255,106,26,.2),rgba(255,149,0,.1));
  box-shadow:0 0 30px var(--accent-glow);
}
.fc-share-btn:active{transform:scale(.97)}
.fc-share-btn i{font-size:16px}

/* ── SHARE FLASH EFFECT ─────────────────────────────── */
.fighter-card.flash{
  animation:shareFlash .8s ease-out;
}
@keyframes shareFlash{
  0%{box-shadow:0 0 0 0 rgba(255,106,26,.6),0 0 60px rgba(255,106,26,.08),0 25px 80px rgba(0,0,0,.6)}
  30%{box-shadow:0 0 0 12px rgba(255,106,26,.3),0 0 100px rgba(255,106,26,.3),0 25px 80px rgba(0,0,0,.6)}
  60%{box-shadow:0 0 0 20px rgba(255,106,26,0),0 0 80px rgba(255,106,26,.15),0 25px 80px rgba(0,0,0,.6)}
  100%{box-shadow:0 0 60px rgba(255,106,26,.08),0 25px 80px rgba(0,0,0,.6)}
}
.fighter-card.flash::before{
  animation:cardRotate 12s linear infinite, flashBurst .8s ease-out;
}
@keyframes flashBurst{
  0%{opacity:1;filter:brightness(3)}
  100%{opacity:1;filter:brightness(1)}
}

/* ── WATERMARK ──────────────────────────────────────── */
.fc-watermark{
  text-align:center;
  padding:0 24px 20px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.12);
}
.fc-watermark span{color:rgba(255,106,26,.35)}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:380px){
  .fc-header{padding:20px 16px 16px;gap:14px}
  .fc-avatar{width:72px;height:72px}
  .fc-avatar-initials{font-size:28px}
  .fc-nickname{font-size:26px;letter-spacing:2px}
  .fc-stats{margin:16px 14px 0}
  .fc-stat{padding:14px 8px}
  .fc-stat-val{font-size:28px}
  .fc-section{padding:16px 16px 0}
  .fc-personal{margin:16px 14px 0;padding:12px 14px;gap:12px}
  .fc-jersey{font-size:24px}
  .fc-history{margin:16px 14px 0}
  .fc-footer{padding:16px 16px 20px}
  .fc-trn-name{max-width:120px}
}

/* ── BACKGROUND PARTICLES ───────────────────────────── */
.bg-particles{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;overflow:hidden;
}
.bg-particle{
  position:absolute;
  width:2px;height:2px;
  border-radius:50%;
  background:var(--accent);
  opacity:0;
  animation:particleFloat linear infinite;
}
@keyframes particleFloat{
  0%{opacity:0;transform:translateY(100vh) scale(0)}
  10%{opacity:.4}
  90%{opacity:.1}
  100%{opacity:0;transform:translateY(-10vh) scale(1)}
}

/* ── ENTRY ANIMATION ────────────────────────────────── */
.fighter-card{
  animation:cardEntry .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardEntry{
  from{opacity:0;transform:translateY(30px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
</style>
</head>
<body>

<!-- Background particles -->
<div class="bg-particles" id="particles"></div>

<!-- ═══════════════════════════════════════════════════
     FIGHTER CARD — КАРТОЧКА ЛЮТОГО ПЛЯЖНИКА
     ═══════════════════════════════════════════════════ -->
<div class="fighter-card" id="fighter-card">

  <!-- HEADER: Avatar + Nickname + Rank -->
  <div class="fc-header">
    <div class="fc-avatar" id="fc-avatar">
      <span class="fc-avatar-initials" id="fc-initials"></span>
    </div>
    <div class="fc-info">
      <div class="fc-nickname" id="fc-nickname"></div>
      <div class="fc-rank" id="fc-rank"></div>
      <div class="fc-community">
        <i class="fa-solid fa-volleyball-ball"></i>
        Лютые пляжники
      </div>
    </div>
  </div>

  <!-- MAIN STATS: Rating, Win%, Tournaments -->
  <div class="fc-stats">
    <div class="fc-stat">
      <div class="fc-stat-val accent" id="fc-rating"></div>
      <div class="fc-stat-lbl">Рейтинг</div>
    </div>
    <div class="fc-stat">
      <div class="fc-stat-val" id="fc-winrate"></div>
      <div class="fc-stat-lbl">Побед %</div>
    </div>
    <div class="fc-stat">
      <div class="fc-stat-val" id="fc-tournaments"></div>
      <div class="fc-stat-lbl">Турниры</div>
    </div>
  </div>

  <!-- ACHIEVEMENTS: Medal Badges -->
  <div class="fc-section">
    <div class="fc-section-title">Витрина</div>
    <div class="fc-badges" id="fc-badges"></div>
  </div>

  <!-- PERSONAL INFO: Jersey + Socials -->
  <div class="fc-personal">
    <div class="fc-jersey">
      <i class="fa-solid fa-shirt"></i>
      <span id="fc-jersey"></span>
    </div>
    <div class="fc-personal-sep"></div>
    <div class="fc-socials" id="fc-socials"></div>
  </div>

  <!-- HISTORY TABLE: Last 5 Tournaments -->
  <div class="fc-section">
    <div class="fc-section-title">Последние турниры</div>
  </div>
  <div class="fc-history">
    <table>
      <thead>
        <tr><th>Турнир</th><th>Дата</th><th>Место</th></tr>
      </thead>
      <tbody id="fc-history-body"></tbody>
    </table>
  </div>

  <!-- WATERMARK -->
  <div class="fc-watermark">
    <span>Лютые пляжники</span> &middot; King of the Court
  </div>

  <!-- SHARE BUTTON -->
  <div class="fc-footer">
    <button class="fc-share-btn" id="fc-share" onclick="shareCard()">
      <i class="fa-solid fa-camera"></i>
      Поделиться
    </button>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════
   DEMO DATA — Захардкоженные данные игрока
   (готово под замену на Supabase fetch)
   ═══════════════════════════════════════════════════════ */
const PLAYER = {
  nickname: 'ДМИТРИЙ ВОЛК',
  initials: 'ДВ',
  avatar: null, // URL или null → покажет инициалы
  rank: 'TOP-10',
  rankIcon: 'fa-fire',
  jersey: 13,
  rating: 1847,
  winrate: 72,
  tournaments: 28,
  medals: {
    gold: 8,
    silver: 5,
    bronze: 3
  },
  achievements: [
    { icon: '🔥', name: 'Серия 5 побед', type: 'special' },
    { icon: '👑', name: 'Легенда пляжа', type: 'special' }
  ],
  socials: [
    { type: 'telegram', url: '#', icon: 'fa-brands fa-telegram' },
    { type: 'vk', url: '#', icon: 'fa-brands fa-vk' }
  ],
  history: [
    { name: 'King of the Court #28', date: '02.03.2026', place: 1 },
    { name: 'Зимний кубок пляжников', date: '15.02.2026', place: 2 },
    { name: 'King of the Court #27', date: '08.02.2026', place: 1 },
    { name: 'Лютый турнир 4×4', date: '25.01.2026', place: 3 },
    { name: 'King of the Court #26', date: '18.01.2026', place: 1 }
  ]
};

/* ═══════════════════════════════════════════════════════
   RENDER — Заполняем карточку данными
   ═══════════════════════════════════════════════════════ */
function renderCard(p) {
  // Avatar
  const avatarEl = document.getElementById('fc-avatar');
  const initialsEl = document.getElementById('fc-initials');
  if (p.avatar) {
    initialsEl.style.display = 'none';
    const img = document.createElement('img');
    img.src = p.avatar;
    img.alt = p.nickname;
    avatarEl.appendChild(img);
  } else {
    initialsEl.textContent = p.initials;
  }

  // Nickname & rank
  document.getElementById('fc-nickname').textContent = p.nickname;
  const rankEl = document.getElementById('fc-rank');
  rankEl.innerHTML = `<i class="fa-solid ${p.rankIcon}"></i> ${p.rank}`;

  // Stats
  document.getElementById('fc-rating').textContent = p.rating;
  document.getElementById('fc-winrate').textContent = p.winrate + '%';
  document.getElementById('fc-tournaments').textContent = p.tournaments;

  // Badges (medals + achievements)
  const badgesEl = document.getElementById('fc-badges');
  let badgesHTML = '';

  if (p.medals.gold > 0) {
    badgesHTML += `<div class="fc-badge gold" data-count="${p.medals.gold}">🥇<span class="fc-badge-tooltip">Золото × ${p.medals.gold}</span></div>`;
  }
  if (p.medals.silver > 0) {
    badgesHTML += `<div class="fc-badge silver" data-count="${p.medals.silver}">🥈<span class="fc-badge-tooltip">Серебро × ${p.medals.silver}</span></div>`;
  }
  if (p.medals.bronze > 0) {
    badgesHTML += `<div class="fc-badge bronze" data-count="${p.medals.bronze}">🥉<span class="fc-badge-tooltip">Бронза × ${p.medals.bronze}</span></div>`;
  }
  for (const a of p.achievements) {
    badgesHTML += `<div class="fc-badge ${a.type}" data-count="0">${a.icon}<span class="fc-badge-tooltip">${a.name}</span></div>`;
  }
  badgesEl.innerHTML = badgesHTML;

  // Jersey
  document.getElementById('fc-jersey').textContent = '#' + p.jersey;

  // Socials
  const socialsEl = document.getElementById('fc-socials');
  socialsEl.innerHTML = p.socials.map(s =>
    `<a href="${s.url}" class="fc-social" target="_blank" rel="noopener"><i class="${s.icon}"></i></a>`
  ).join('');

  // History table
  const tbody = document.getElementById('fc-history-body');
  tbody.innerHTML = p.history.map(h => {
    const placeClass = h.place === 1 ? 'p1' : h.place === 2 ? 'p2' : h.place === 3 ? 'p3' : 'other';
    return `<tr>
      <td class="fc-trn-name">${h.name}</td>
      <td class="fc-trn-date">${h.date}</td>
      <td><span class="fc-place ${placeClass}">${h.place}</span></td>
    </tr>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   SHARE — Подсветка карточки (готовый кадр для сторис)
   ═══════════════════════════════════════════════════════ */
function shareCard() {
  const card = document.getElementById('fighter-card');
  card.classList.remove('flash');
  // Force reflow so animation restarts
  void card.offsetWidth;
  card.classList.add('flash');

  // Try native share if available
  if (navigator.share) {
    navigator.share({
      title: `${PLAYER.nickname} — Лютые пляжники`,
      text: `🏐 ${PLAYER.nickname} | Рейтинг: ${PLAYER.rating} | Побед: ${PLAYER.winrate}% | Турниров: ${PLAYER.tournaments} | 🥇${PLAYER.medals.gold} 🥈${PLAYER.medals.silver} 🥉${PLAYER.medals.bronze}`,
      url: window.location.href
    }).catch(() => {});
  }
}

/* ═══════════════════════════════════════════════════════
   BACKGROUND PARTICLES
   ═══════════════════════════════════════════════════════ */
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.classList.add('bg-particle');
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
}

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderCard(PLAYER);
  createParticles();
});
</script>
</body>
</html>
