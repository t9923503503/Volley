<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Ultimate Fighter Card — Лютые Пляжники Сургут</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ════════════════════════════════════════════════════════════════
   ULTIMATE FIGHTER CARD — КИБЕРПАНК × СЕВЕР
   Огонь и Лед Сургута | Гексагональная геометрия
   ════════════════════════════════════════════════════════════════ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ЦВЕТОВАЯ ПАЛИТРА: Огонь & Лед */
  --bg-dark:#080808;        /* Глубокий уголь */
  --bg-card:#1a1a1a;        /* Графит */
  --text-primary:#ffffff;   /* Белый */
  --text-secondary:#9a9a9a; /* Серый */
  --accent-fire:#FF4500;    /* Огненный оранжевый (раскаленный металл) */
  --accent-ice:#00BFFF;     /* Ледяной синий (северное сияние) */
  --accent-dark:#cc3300;    /* Темный оранжевый для контраста */
  --accent-light:#00ffff;   /* Голубой неон */
  --glow-fire:rgba(255,69,0,.5);
  --glow-ice:rgba(0,191,255,.3);
  --neon-glow:rgba(0,255,255,.4);
}
html{
  font-size:16px;
  -webkit-text-size-adjust:100%;
}
body{
  font-family:'Oswald','Barlow Condensed',sans-serif;
  background:var(--bg-dark);
  color:var(--text-primary);
  min-height:100vh;min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  overflow-x:hidden;
  /* Микротекстура: потертая поверхность */
  background-image:
    radial-gradient(at 20% 30%, rgba(255,69,0,.04) 0%, transparent 50%),
    radial-gradient(at 80% 70%, rgba(0,191,255,.04) 0%, transparent 50%),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,.01) 2px, rgba(255,255,255,.01) 4px);
}

/* ════════════════════════════════════════════════════
   КОНТЕЙНЕР КАРТОЧЕК & СЕТКА
   ════════════════════════════════════════════════════ */
.fighter-cards-container{
  width:100%;
  max-width:1200px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
  gap:32px;
  animation:sceneEntry 1.2s cubic-bezier(.16,1,.3,1) both;
}
@keyframes sceneEntry{
  from{opacity:0;transform:translateY(60px)}
  to{opacity:1;transform:translateY(0)}
}

/* ════════════════════════════════════════════════════
   БОЕВАЯ КАРТОЧКА — ГЛАВНЫЙ КОНТЕЙНЕР
   ════════════════════════════════════════════════════ */
.fighter-card{
  position:relative;
  background:var(--bg-card);
  border-radius:12px;
  overflow:hidden;
  /* ГРАНИЦА: Огонь ↔ Лед */
  border:2px solid transparent;
  background-clip:padding-box;
  box-shadow:
    0 0 60px var(--glow-fire),
    0 0 40px var(--glow-ice),
    inset 0 0 30px rgba(255,69,0,.05),
    0 20px 60px rgba(0,0,0,.8);
  animation:cardHover 3s ease-in-out infinite;
}
.fighter-card::before{
  content:'';position:absolute;
  top:-2px;right:-2px;bottom:-2px;left:-2px;
  background:linear-gradient(180deg,
    var(--accent-fire) 0%,
    rgba(255,69,0,.4) 25%,
    rgba(0,191,255,.3) 50%,
    var(--accent-ice) 100%);
  border-radius:12px;
  z-index:-1;
  animation:borderRotate 6s linear infinite;
}
@keyframes borderRotate{
  0%{background-position:0% 0%}
  100%{background-position:100% 100%}
}
@keyframes cardHover{
  0%,100%{transform:translateY(0) scale(1);opacity:1}
  50%{transform:translateY(-3px) scale(1.001)}
}
.fighter-card:hover{
  transform:translateY(-8px);
  box-shadow:
    0 0 80px var(--glow-fire),
    0 0 60px var(--glow-ice),
    inset 0 0 40px rgba(255,69,0,.1),
    0 30px 80px rgba(0,0,0,.9);
}

/* ════════════════════════════════════════════════════
   HEADER: ГЕКСАГОНАЛЬНЫЙ АВАТАР + НИКНЕЙМ + РАНГ
   ════════════════════════════════════════════════════ */
.fc-header{
  padding:24px;
  display:flex;
  align-items:center;
  gap:20px;
  background:linear-gradient(135deg,
    rgba(255,69,0,.08) 0%,
    rgba(0,0,0,.2) 50%,
    rgba(0,191,255,.04) 100%);
  border-bottom:1px solid rgba(0,191,255,.15);
  position:relative;
}
.fc-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,var(--accent-fire),var(--accent-ice),var(--accent-fire));
  opacity:.4;
}

/* ГЕКСАГОНАЛЬНЫЙ АВАТАР */
.fc-avatar{
  width:92px;
  height:92px;
  flex-shrink:0;
  position:relative;
  background:linear-gradient(135deg,
    rgba(255,69,0,.15),
    rgba(0,191,255,.1));
  border:2px solid transparent;
  background-clip:padding-box;
  /* Гексагон через clip-path */
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:visible;
}
.fc-avatar::before{
  content:'';position:absolute;
  inset:-2px;
  background:conic-gradient(from 0deg,var(--accent-fire),var(--accent-ice),var(--accent-fire));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  z-index:-1;
  animation:hexRotate 4s linear infinite;
}
@keyframes hexRotate{
  0%{background-position:0% 0%}
  100%{background-position:360deg 0%}
}
.fc-avatar img{
  width:100%;height:100%;
  object-fit:cover;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
.fc-avatar-initials{
  font-family:'Bebas Neue',sans-serif;
  font-size:40px;
  letter-spacing:2px;
  font-weight:bold;
  background:linear-gradient(135deg,var(--accent-fire),var(--accent-ice));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:0 0 30px rgba(255,69,0,.4);
  filter:drop-shadow(0 0 20px rgba(0,191,255,.3));
}

.fc-info{flex:1;min-width:0}

.fc-nickname{
  font-family:'Bebas Neue','Oswald',sans-serif;
  font-size:36px;
  letter-spacing:4px;
  line-height:1;
  color:var(--text-primary);
  text-transform:uppercase;
  text-shadow:
    0 0 20px rgba(255,69,0,.5),
    0 0 40px rgba(255,69,0,.2),
    0 2px 8px rgba(0,0,0,.8);
  margin-bottom:6px;
  animation:nickEntry .8s cubic-bezier(.16,1,.3,1) backwards;
}
@keyframes nickEntry{
  from{opacity:0;transform:translateX(-20px)}
  to{opacity:1;transform:translateX(0)}
}

.fc-rank{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 14px;
  border-radius:6px;
  border:1px solid var(--accent-fire);
  background:linear-gradient(135deg,
    rgba(255,69,0,.15),
    rgba(255,69,0,.05));
  color:var(--accent-fire);
  font-family:'Oswald',sans-serif;
  font-size:11px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  box-shadow:0 0 20px rgba(255,69,0,.25);
  animation:rankPulse 2s ease-in-out infinite;
}
@keyframes rankPulse{
  0%,100%{box-shadow:0 0 20px rgba(255,69,0,.25)}
  50%{box-shadow:0 0 40px rgba(255,69,0,.5),inset 0 0 20px rgba(255,69,0,.15)}
}
.fc-rank i{font-size:11px}

.fc-community{
  margin-top:8px;
  font-size:10px;
  color:var(--accent-ice);
  letter-spacing:1px;
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:600;
  text-transform:uppercase;
}
.fc-community i{font-size:9px}

/* ════════════════════════════════════════════════════
   ГЛАВНЫЕ СТАТИСТИКИ: НЕОНОВЫЙ РЕЙТИНГ + ПРОЦЕНТ + ИГРЫ
   ════════════════════════════════════════════════════ */
.fc-stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:1px;
  padding:1px;
  margin:24px 20px;
  background:linear-gradient(135deg,var(--accent-fire),var(--accent-ice));
  border-radius:10px;
  overflow:hidden;
  box-shadow:
    inset 0 0 30px rgba(255,69,0,.1),
    0 0 30px rgba(255,69,0,.2),
    0 0 20px rgba(0,191,255,.1);
}
.fc-stat{
  padding:20px 14px;
  text-align:center;
  background:var(--bg-card);
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,69,0,.1);
  transition:all .3s ease;
}
.fc-stat::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(255,69,0,.1),transparent 70%);
  pointer-events:none;
}
.fc-stat:hover{
  background:linear-gradient(135deg,rgba(255,69,0,.08),rgba(0,191,255,.04));
  border-color:rgba(0,191,255,.2);
}

.fc-stat-val{
  font-family:'Bebas Neue','Oswald',sans-serif;
  font-size:44px;
  line-height:1;
  letter-spacing:2px;
  font-weight:900;
  color:var(--text-primary);
  margin-bottom:2px;
  position:relative;
  z-index:2;
}
/* НЕОНОВЫЙ РЕЙТИНГ — пульсирующее свечение */
.fc-stat:first-child .fc-stat-val{
  color:var(--accent-fire);
  text-shadow:
    0 0 10px rgba(255,69,0,.8),
    0 0 20px rgba(255,69,0,.6),
    0 0 40px rgba(255,69,0,.4),
    0 0 60px rgba(255,69,0,.2);
  animation:neonPulse 1.5s ease-in-out infinite;
}
@keyframes neonPulse{
  0%,100%{
    text-shadow:
      0 0 10px rgba(255,69,0,.8),
      0 0 20px rgba(255,69,0,.6),
      0 0 40px rgba(255,69,0,.4),
      0 0 60px rgba(255,69,0,.2);
  }
  50%{
    text-shadow:
      0 0 20px rgba(255,69,0,1),
      0 0 30px rgba(255,69,0,.8),
      0 0 60px rgba(255,69,0,.6),
      0 0 100px rgba(255,69,0,.3);
  }
}

.fc-stat-lbl{
  font-family:'Oswald',sans-serif;
  font-size:9px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-secondary);
  position:relative;
  z-index:2;
}

/* ════════════════════════════════════════════════════
   ДОСТИЖЕНИЯ & МЕДАЛИ — Гексагональные бейджи
   ════════════════════════════════════════════════════ */
.fc-section{padding:20px 24px 0}
.fc-section-title{
  font-family:'Oswald',sans-serif;
  font-size:10px;
  font-weight:900;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--accent-ice);
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.fc-section-title::before{
  content:'';width:4px;height:4px;
  border-radius:50%;
  background:var(--accent-fire);
  box-shadow:0 0 10px var(--accent-fire);
}
.fc-section-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(0,191,255,.3),transparent);
}

.fc-badges{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(56px,1fr));
  gap:12px;
  animation:badgesEntry 1s cubic-bezier(.16,1,.3,1) backwards;
}
@keyframes badgesEntry{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.fc-badge{
  width:56px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  position:relative;
  cursor:pointer;
  /* Гексагон */
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:var(--bg-card);
  border:2px solid transparent;
  background-clip:padding-box;
  overflow:visible;
  transition:all .3s ease;
}
.fc-badge::before{
  content:'';position:absolute;
  inset:-2px;
  background:linear-gradient(135deg,var(--accent-fire),var(--accent-ice));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  z-index:-1;
}
.fc-badge:hover{
  transform:scale(1.15) rotate(5deg);
  filter:drop-shadow(0 0 20px rgba(255,69,0,.5)) drop-shadow(0 0 10px rgba(0,191,255,.3));
}
.fc-badge::after{
  content:attr(data-count);
  position:absolute;
  top:-8px;right:-8px;
  min-width:22px;
  height:22px;
  border-radius:50%;
  background:var(--accent-fire);
  border:2px solid var(--bg-dark);
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  font-weight:900;
  color:var(--bg-dark);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px var(--accent-fire);
}
.fc-badge[data-count="0"]::after{display:none}

.fc-badge-tooltip{
  display:none;
  position:absolute;
  bottom:calc(100% + 14px);
  left:50%;
  transform:translateX(-50%);
  padding:6px 12px;
  border-radius:6px;
  border:1px solid var(--accent-fire);
  background:linear-gradient(135deg,rgba(255,69,0,.2),rgba(0,191,255,.1));
  backdrop-filter:blur(10px);
  font-size:10px;
  font-weight:700;
  letter-spacing:.5px;
  white-space:nowrap;
  color:var(--text-primary);
  z-index:100;
  pointer-events:none;
  animation:tooltipEntry .3s ease;
}
@keyframes tooltipEntry{
  from{opacity:0;transform:translateX(-50%) translateY(10px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}
.fc-badge:hover .fc-badge-tooltip{display:block}

/* ════════════════════════════════════════════════════
   ЛИЧНАЯ ИНФОРМАЦИЯ: НОМЕР + СОЦСЕТИ
   ════════════════════════════════════════════════════ */
.fc-personal{
  display:flex;
  align-items:center;
  gap:18px;
  padding:18px 24px;
  margin:24px 20px;
  background:linear-gradient(135deg,
    rgba(255,69,0,.06),
    rgba(0,191,255,.03));
  border:1px solid rgba(0,191,255,.2);
  border-radius:10px;
  position:relative;
  overflow:hidden;
}
.fc-personal::before{
  content:'';position:absolute;
  inset:0;
  background:conic-gradient(from 0deg at 50% 50%,transparent,rgba(255,69,0,.05),transparent);
  pointer-events:none;
}

.fc-jersey{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:'Bebas Neue','Oswald',sans-serif;
  font-size:32px;
  letter-spacing:2px;
  font-weight:900;
  color:var(--accent-fire);
  text-shadow:0 0 15px rgba(255,69,0,.5);
  position:relative;
  z-index:2;
}
.fc-jersey i{
  font-size:16px;
  opacity:.6;
}

.fc-personal-sep{
  width:1px;
  height:32px;
  background:linear-gradient(180deg,rgba(255,69,0,.2),rgba(0,191,255,.2),rgba(255,69,0,.1));
  position:relative;
  z-index:2;
}

.fc-socials{
  display:flex;
  gap:8px;
  align-items:center;
  position:relative;
  z-index:2;
}

.fc-social{
  width:38px;
  height:38px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,rgba(255,69,0,.1),rgba(0,191,255,.05));
  border:1px solid rgba(0,191,255,.25);
  color:var(--accent-ice);
  font-size:16px;
  text-decoration:none;
  transition:all .25s ease;
}
.fc-social:hover{
  color:var(--accent-fire);
  border-color:rgba(255,69,0,.5);
  background:linear-gradient(135deg,rgba(255,69,0,.2),rgba(0,191,255,.1));
  transform:translateY(-3px);
  box-shadow:0 0 20px rgba(255,69,0,.3);
}

/* ════════════════════════════════════════════════════
   ТАБЛИЦА ПОСЛЕДНИХ ИГР — Огненные победы, холодные поражения
   ════════════════════════════════════════════════════ */
.fc-history{
  margin:24px 20px;
  background:linear-gradient(135deg,rgba(255,69,0,.04),rgba(0,191,255,.02));
  border:1px solid rgba(0,191,255,.15);
  border-radius:10px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:inset 0 0 20px rgba(255,69,0,.03);
}

.fc-history table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
}

.fc-history th{
  font-family:'Oswald',sans-serif;
  font-size:9px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--accent-ice);
  padding:14px 16px;
  text-align:left;
  background:linear-gradient(135deg,rgba(255,69,0,.05),rgba(0,191,255,.04));
  border-bottom:2px solid rgba(0,191,255,.15);
  position:relative;
}
.fc-history th::after{
  content:'';position:absolute;
  bottom:-2px;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--accent-fire),var(--accent-ice),var(--accent-fire));
}

.fc-history td{
  padding:12px 16px;
  font-size:12px;
  font-weight:500;
  color:var(--text-primary);
  border-bottom:1px solid rgba(0,191,255,.08);
}

/* ИНДИКАЦИЯ ПОБЕД/ПОРАЖЕНИЙ */
.fc-history tbody tr{
  transition:all .2s ease;
  position:relative;
  overflow:hidden;
}
.fc-history tbody tr::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:transparent;
  transition:all .2s ease;
}
.fc-history tbody tr.win::before{
  background:linear-gradient(180deg,var(--accent-fire),rgba(255,69,0,.2));
  box-shadow:inset 3px 0 10px rgba(255,69,0,.4);
}
.fc-history tbody tr.loss::before{
  background:linear-gradient(180deg,rgba(100,100,120,.4),transparent);
  box-shadow:inset 3px 0 10px rgba(100,100,120,.2);
}
.fc-history tbody tr:hover{
  background:rgba(0,191,255,.08);
}
.fc-history tbody tr.win:hover{
  background:rgba(255,69,0,.1);
}
.fc-history tbody tr:last-child td{border-bottom:none}

.fc-place{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:32px;
  height:32px;
  border-radius:6px;
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  font-weight:900;
  transition:all .2s ease;
}
.fc-place.p1{
  background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,69,0,.15));
  color:var(--accent-fire);
  border:1.5px solid rgba(255,215,0,.4);
  box-shadow:0 0 12px rgba(255,215,0,.2);
}
.fc-place.p1:hover{
  box-shadow:0 0 20px rgba(255,215,0,.4),0 0 10px rgba(255,69,0,.3);
}
.fc-place.p2{
  background:linear-gradient(135deg,rgba(192,192,192,.15),rgba(200,200,200,.05));
  color:#c0c0c0;
  border:1.5px solid rgba(192,192,192,.3);
}
.fc-place.p3{
  background:linear-gradient(135deg,rgba(205,127,50,.15),rgba(255,140,0,.05));
  color:#cd7f32;
  border:1.5px solid rgba(205,127,50,.3);
}
.fc-place.other{
  background:rgba(0,191,255,.08);
  color:var(--accent-ice);
  border:1.5px solid rgba(0,191,255,.2);
}

.fc-trn-name{
  font-weight:600;
  max-width:180px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.fc-trn-date{
  font-size:11px;
  color:var(--text-secondary);
  font-weight:500;
}

/* ════════════════════════════════════════════════════
   FOOTER & SHARE BUTTON — Киберпанк кнопка
   ════════════════════════════════════════════════════ */
.fc-footer{
  padding:20px 24px 24px;
}

.fc-share-btn{
  width:100%;
  padding:16px;
  border-radius:10px;
  border:2px solid var(--accent-fire);
  background:linear-gradient(135deg,
    rgba(255,69,0,.15),
    rgba(255,69,0,.05));
  color:var(--accent-fire);
  font-family:'Bebas Neue','Oswald',sans-serif;
  font-size:18px;
  letter-spacing:3px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  text-transform:uppercase;
  font-weight:900;
  transition:all .3s ease;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.fc-share-btn::before{
  content:'';position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,191,255,.3),transparent);
  transform:translateX(-100%);
  transition:transform .5s ease;
}
.fc-share-btn:hover{
  background:linear-gradient(135deg,
    rgba(255,69,0,.25),
    rgba(0,191,255,.1));
  border-color:var(--accent-ice);
  box-shadow:
    0 0 30px rgba(255,69,0,.4),
    0 0 20px rgba(0,191,255,.2),
    inset 0 0 20px rgba(255,69,0,.1);
  color:var(--accent-ice);
}
.fc-share-btn:hover::before{
  transform:translateX(100%);
}
.fc-share-btn:active{
  transform:scale(.96);
}
.fc-share-btn i{
  font-size:14px;
}

/* ════════════════════════════════════════════════════
   FOOTWATERMARK
   ════════════════════════════════════════════════════ */
.fc-watermark{
  text-align:center;
  padding:16px 24px 20px;
  font-family:'Oswald',sans-serif;
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(0,191,255,.3);
}
.fc-watermark::before{
  content:'⚡ ';
  color:var(--accent-fire);
}
.fc-watermark::after{
  content:' ⚡';
  color:var(--accent-ice);
}

/* ════════════════════════════════════════════════════
   RESPONSIVE DESIGN
   ════════════════════════════════════════════════════ */
@media(max-width:480px){
  .fighter-cards-container{
    grid-template-columns:1fr;
    gap:24px;
  }
  .fc-header{padding:20px 18px}
  .fc-avatar{width:80px;height:80px}
  .fc-avatar-initials{font-size:32px}
  .fc-nickname{font-size:28px;letter-spacing:2px}
  .fc-rank{font-size:10px;padding:5px 12px}
  .fc-stats{margin:18px 14px;grid-template-columns:1fr 1fr 1fr;gap:1px}
  .fc-stat{padding:14px 10px}
  .fc-stat-val{font-size:32px}
  .fc-stat-lbl{font-size:8px}
  .fc-section{padding:16px 18px 0}
  .fc-badges{grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:10px}
  .fc-badge{width:48px;height:48px;font-size:20px}
  .fc-personal{margin:16px 14px;padding:14px 16px;gap:12px}
  .fc-jersey{font-size:24px}
  .fc-history{margin:16px 14px}
  .fc-footer{padding:14px 18px}
  .fc-trn-name{max-width:140px}
}

/* ════════════════════════════════════════════════════
   ENTRY ANIMATIONS
   ════════════════════════════════════════════════════ */
.fighter-card{
  animation:cardEnter .7s cubic-bezier(.34,.1,.68,1) backwards;
}
@keyframes cardEnter{
  from{
    opacity:0;
    transform:translateY(40px) scale(.92);
    filter:blur(4px);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
  }
}

/* Stagger animation for multiple cards */
.fighter-card:nth-child(1){animation-delay:.1s}
.fighter-card:nth-child(2){animation-delay:.2s}
.fighter-card:nth-child(3){animation-delay:.3s}
</style>
</head>
<body>

<div class="fighter-cards-container" id="cards-container"></div>

<script>
/* ════════════════════════════════════════════════════════════════
   ULTIMATE FIGHTER CARDS — КИБЕРПАНК UI
   Динамический рендер из JSON с поддержкой нескольких карточек
   ════════════════════════════════════════════════════════════════ */

/**
 * JSON-структура игрока:
 * {
 *   nickname: "MAMEDOV",
 *   initials: "MM",
 *   avatar: null,
 *   rank: "LYUTYI",         // LYUTYI | PRO | NEXT
 *   rankIcon: "fa-fire",
 *   jersey: 7,
 *   rating: 3900,
 *   winrate: 78,
 *   tournaments: 42,
 *   status: "LYUTYI",       // Статус для ранга
 *   medals: { gold, silver, bronze },
 *   achievements: [ { icon, name, type: "crown|fire|snow|special" } ],
 *   socials: [ { type, url, icon } ],
 *   recent_games: [ { name, date, result: "win|loss", place } ]
 * }
 */

// ════════════════════════════════════════════════════════════════
// ДЕМО-ДАННЫЕ: 3 ЛЮТЫХ БОЙЦА
// ════════════════════════════════════════════════════════════════
const PLAYERS_DATABASE = [
  {
    nickname: 'MAMEDOV',
    initials: 'MM',
    avatar: null,
    rank: 'LYUTYI',
    rankIcon: 'fa-fire',
    jersey: 7,
    rating: 3900,
    winrate: 78,
    tournaments: 42,
    status: 'LYUTYI',
    medals: { gold: 15, silver: 8, bronze: 4 },
    achievements: [
      { icon: '🔥', name: 'Огненный поток', type: 'fire' },
      { icon: '👑', name: 'Король сургута', type: 'crown' },
      { icon: '❄️', name: 'Ледяной удар', type: 'snow' }
    ],
    socials: [
      { type: 'telegram', url: '#', icon: 'fa-brands fa-telegram' },
      { type: 'instagram', url: '#', icon: 'fa-brands fa-instagram' }
    ],
    recent_games: [
      { name: 'King of the Court #30', date: '05.03.2026', result: 'win', place: 1 },
      { name: 'Сургут Мастер Лига', date: '02.03.2026', result: 'win', place: 1 },
      { name: 'Зимний Кубок Северян', date: '28.02.2026', result: 'loss', place: 4 },
      { name: 'King of the Court #29', date: '24.02.2026', result: 'win', place: 1 },
      { name: 'Лютая Серия 4x4', date: '18.02.2026', result: 'win', place: 2 }
    ]
  },
  {
    nickname: 'SHPERLING',
    initials: 'SH',
    avatar: null,
    rank: 'PRO',
    rankIcon: 'fa-star',
    jersey: 1,
    rating: 3750,
    winrate: 74,
    tournaments: 38,
    status: 'PRO',
    medals: { gold: 12, silver: 10, bronze: 6 },
    achievements: [
      { icon: '⚡', name: 'Молниеносный', type: 'special' },
      { icon: '🎯', name: 'Точный расчет', type: 'crown' }
    ],
    socials: [
      { type: 'vk', url: '#', icon: 'fa-brands fa-vk' },
      { type: 'telegram', url: '#', icon: 'fa-brands fa-telegram' }
    ],
    recent_games: [
      { name: 'King of the Court #30', date: '05.03.2026', result: 'loss', place: 3 },
      { name: 'Сургут Мастер Лига', date: '02.03.2026', result: 'win', place: 2 },
      { name: 'Зимний Кубок Северян', date: '28.02.2026', result: 'win', place: 1 },
      { name: 'King of the Court #29', date: '24.02.2026', result: 'loss', place: 5 },
      { name: 'Лютая Серия 4x4', date: '18.02.2026', result: 'win', place: 1 }
    ]
  },
  {
    nickname: 'DMITRIY VOLK',
    initials: 'DV',
    avatar: null,
    rank: 'NEXT',
    rankIcon: 'fa-rocket',
    jersey: 13,
    rating: 3600,
    winrate: 71,
    tournaments: 28,
    status: 'NEXT',
    medals: { gold: 8, silver: 5, bronze: 3 },
    achievements: [
      { icon: '🚀', name: 'Восходящая звезда', type: 'special' },
      { icon: '🔥', name: 'Горячая голова', type: 'fire' }
    ],
    socials: [
      { type: 'telegram', url: '#', icon: 'fa-brands fa-telegram' },
      { type: 'vk', url: '#', icon: 'fa-brands fa-vk' }
    ],
    recent_games: [
      { name: 'King of the Court #30', date: '05.03.2026', result: 'win', place: 2 },
      { name: 'Сургут Мастер Лига', date: '02.03.2026', result: 'loss', place: 5 },
      { name: 'Зимний Кубок Северян', date: '28.02.2026', result: 'win', place: 2 },
      { name: 'King of the Court #29', date: '24.02.2026', result: 'win', place: 2 },
      { name: 'Лютая Серия 4x4', date: '18.02.2026', result: 'loss', place: 3 }
    ]
  }
];

// ════════════════════════════════════════════════════════════════
// РЕНДЕР КАРТОЧЕК
// ════════════════════════════════════════════════════════════════

function createFighterCard(player) {
  const badgesHTML = createBadgesHTML(player);
  const socialsHTML = createSocialsHTML(player);
  const historyHTML = createHistoryTableHTML(player);

  const ratingDisplayed = Math.round(player.rating / 100);

  return `
    <div class="fighter-card">
      <!-- HEADER -->
      <div class="fc-header">
        <div class="fc-avatar">
          <span class="fc-avatar-initials">${player.initials}</span>
        </div>
        <div class="fc-info">
          <div class="fc-nickname">${player.nickname}</div>
          <div class="fc-rank">
            <i class="fa-solid ${player.rankIcon}"></i> ${player.status}
          </div>
          <div class="fc-community">
            <i class="fa-solid fa-volleyball-ball"></i>
            ЛЮТЫЕ ПЛЯЖНИКИ
          </div>
        </div>
      </div>

      <!-- MAIN STATS -->
      <div class="fc-stats">
        <div class="fc-stat">
          <div class="fc-stat-val">${ratingDisplayed}</div>
          <div class="fc-stat-lbl">Рейтинг</div>
        </div>
        <div class="fc-stat">
          <div class="fc-stat-val">${player.winrate}%</div>
          <div class="fc-stat-lbl">Побед</div>
        </div>
        <div class="fc-stat">
          <div class="fc-stat-val">${player.tournaments}</div>
          <div class="fc-stat-lbl">Турниры</div>
        </div>
      </div>

      <!-- ACHIEVEMENTS -->
      <div class="fc-section">
        <div class="fc-section-title">ВИТРИНА</div>
        <div class="fc-badges">
          ${badgesHTML}
        </div>
      </div>

      <!-- PERSONAL INFO -->
      <div class="fc-personal">
        <div class="fc-jersey">
          <i class="fa-solid fa-shirt"></i>
          <span>#${player.jersey}</span>
        </div>
        <div class="fc-personal-sep"></div>
        <div class="fc-socials">
          ${socialsHTML}
        </div>
      </div>

      <!-- HISTORY TABLE -->
      <div class="fc-section">
        <div class="fc-section-title">БОЕВОЙ ЖУРНАЛ</div>
      </div>
      <div class="fc-history">
        <table>
          <thead>
            <tr><th>ТУРНИР</th><th>ДАТА</th><th>МЕСТО</th></tr>
          </thead>
          <tbody>
            ${historyHTML}
          </tbody>
        </table>
      </div>

      <!-- WATERMARK -->
      <div class="fc-watermark">ЛЮТЫЕ ПЛЯЖНИКИ • KING OF THE COURT</div>

      <!-- SHARE BUTTON -->
      <div class="fc-footer">
        <button class="fc-share-btn" onclick="shareCard('${player.nickname}')">
          <i class="fa-solid fa-camera"></i> ПОДЕЛИТЬСЯ
        </button>
      </div>
    </div>
  `;
}

function createBadgesHTML(player) {
  let html = '';

  // Медали
  if (player.medals.gold > 0) {
    html += `<div class="fc-badge" data-count="${player.medals.gold}">🥇<span class="fc-badge-tooltip">Золото ${player.medals.gold}</span></div>`;
  }
  if (player.medals.silver > 0) {
    html += `<div class="fc-badge" data-count="${player.medals.silver}">🥈<span class="fc-badge-tooltip">Серебро ${player.medals.silver}</span></div>`;
  }
  if (player.medals.bronze > 0) {
    html += `<div class="fc-badge" data-count="${player.medals.bronze}">🥉<span class="fc-badge-tooltip">Бронза ${player.medals.bronze}</span></div>`;
  }

  // Достижения
  player.achievements.forEach(a => {
    html += `<div class="fc-badge" data-count="0">${a.icon}<span class="fc-badge-tooltip">${a.name}</span></div>`;
  });

  return html;
}

function createSocialsHTML(player) {
  return player.socials.map(s =>
    `<a href="${s.url}" class="fc-social" target="_blank" rel="noopener" title="${s.type}">
       <i class="${s.icon}"></i>
     </a>`
  ).join('');
}

function createHistoryTableHTML(player) {
  return player.recent_games.map(g => {
    const placeClass = g.place === 1 ? 'p1' : g.place === 2 ? 'p2' : g.place === 3 ? 'p3' : 'other';
    const resultClass = g.result === 'win' ? 'win' : 'loss';
    return `<tr class="${resultClass}">
      <td class="fc-trn-name">${g.name}</td>
      <td class="fc-trn-date">${g.date}</td>
      <td><span class="fc-place ${placeClass}">${g.place}</span></td>
    </tr>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════
// SHARE ФУНКЦИЯ
// ════════════════════════════════════════════════════════════════

function shareCard(nickname) {
  const text = `🔥 ${nickname} — Лютый боец! 🔥 Проверь карточку на Лютых Пляжниках Сургут!`;

  if (navigator.share) {
    navigator.share({
      title: `${nickname} — Fighter Card`,
      text: text,
      url: window.location.href
    }).catch(() => {});
  } else {
    alert(text);
  }
}

// ════════════════════════════════════════════════════════════════
// ИНИЦИАЛИЗАЦИЯ
// ════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('cards-container');

  PLAYERS_DATABASE.forEach(player => {
    const cardHTML = createFighterCard(player);
    container.insertAdjacentHTML('beforeend', cardHTML);
  });
});
</script>
</body>
</html>
